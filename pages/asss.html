            <p><strong>Paramentos do oficiante</strong> <span class="cite">(§ 179, n. 938)</span>: <strong>sobrepeliz, estola e pluvial</strong> (com D e S, veste alva e pluvial); o <strong>manípulo não se põe</strong>; paramentos <strong>sempre brancos</strong> (salvo logo após a missa/vésperas, com a cor do ofício); véu de ombros sempre branco.</p>` },
          { n: 89, q: "Que particularidades tem a imposição de incenso na Bênção do Santíssimo, em comparação com a da missa? Como se faz a incensação do Santíssimo?", a: `
            <p><strong>Particularidades da imposição</strong> <span class="cite">(§ 179, n. 940; n. 934)</span>:</p>
            <ul>
              <li>o celebrante <strong>NÃO benze o incenso</strong> (na missa, benze com <em>Ab illo benedicaris</em>);</li>
              <li>faz-se <strong>ajoelhado</strong>; o diácono entrega a colherinha <strong>sem ósculo</strong>;</li>
              <li>incensa-se o Santíssimo <strong>duas vezes</strong> (na exposição e ao <em>Genitori</em>).</li>
            </ul>
            <p><strong>Incensação do Santíssimo:</strong> de <strong>joelhos</strong>, com <strong>três ductos duplos</strong>, com inclinação medíocre antes e depois. <span class="cite">(§ 179, n. 943)</span></p>` },
          { n: 90, q: "No <em>Tantum ergo</em>, que reverência se faz às palavras <em>Veneremur cernui</em>, e o que se segue (segunda imposição, versículo, véu umeral)?", a: `
            <p><strong>Reverência:</strong> do <em>Tantum ergo</em> até o <em>Veneremur cernui</em> (inclusive), faz-se <strong>inclinação medíocre do corpo</strong>. <span class="cite">(§ 179, n. 941, 944)</span></p>
            <p><strong>O que se segue</strong> <span class="cite">(§ 179, n. 944)</span>:</p>
            <ol>
              <li><strong>Segunda imposição de incenso</strong> — logo depois do <em>Veneremur cernui</em> (ou ao <em>Genitori</em>); incensa-se de novo o Santíssimo;</li>
              <li><strong>Versículo e oração</strong> — <em>Panem de cœlo…</em> e a oração;</li>
              <li><strong>Véu umeral</strong> — o celebrante recebe o <strong>véu de ombros</strong>, sobe ao supedâneo e recebe a custódia de pé, com as mãos envoltas no véu;</li>
              <li><strong>A bênção</strong> — traça com a custódia o sinal da cruz sobre o povo; toca-se a campainha até acabar. Depois entrega o véu e rezam-se as Louvações (<em>Deus seja bendito…</em>).</li>
            </ol>` }
        ]
      }
    ];

          '<span class="qsection-chevron" aria-hidden="true">&rsaquo;</span>' +
          '<span class="qsection-title">' + sec.title + "</span>" +
          '<span class="qsection-count">' + sec.range + "</span>";
        head.addEventListener("click", function () {
          section.classList.toggle("open");
        });

        var body = document.createElement("div");
        body.className = "qsection-body";

        sec.items.forEach(function (item) {
          var q = document.createElement("div");
          q.className = "q";

          var qHead = document.createElement("button");
          qHead.type = "button";
          qHead.className = "q-head";
          qHead.innerHTML =
            '<span class="q-num">' + item.n + "</span>" +
            '<span class="q-text">' + item.q + "</span>" +
            '<span class="q-chevron" aria-hidden="true">&rsaquo;</span>';
          qHead.addEventListener("click", function () {
            q.classList.toggle("open");
          });

          var qBody = document.createElement("div");
          qBody.className = "q-body";
          qBody.innerHTML = item.a
            ? '<div class="q-answer">' + item.a + "</div>"
            : '<p class="q-empty">Resposta em breve.</p>';

          q.appendChild(qHead);
          q.appendChild(qBody);
          body.appendChild(q);
        });

        section.appendChild(head);
        section.appendChild(body);
        root.appendChild(section);
      });

      var sections = root.querySelectorAll(".qsection");
      var questions = root.querySelectorAll(".q");
      var modeButtons = document.querySelectorAll(".quiz-mode-btn");

      function apply(mode) {
        if (mode === "all") {
          sections.forEach(function (s) { s.classList.add("open"); });
          questions.forEach(function (q) { q.classList.add("open"); });
        } else if (mode === "hide") {
          sections.forEach(function (s) { s.classList.add("open"); });
          questions.forEach(function (q) { q.classList.remove("open"); });
        } else if (mode === "sections") {
          sections.forEach(function (s) { s.classList.remove("open"); });
          questions.forEach(function (q) { q.classList.remove("open"); });
        }
        modeButtons.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-mode") === mode);
        });
      }

      modeButtons.forEach(function (b) {
        b.addEventListener("click", function () {
          apply(b.getAttribute("data-mode"));
        });
      });

      // Modo padrao: Esconder tudo (secoes abertas, respostas fechadas) — clicar para revelar.
      apply("hide");
    })();
  </script>
</body>
</html>
