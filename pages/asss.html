<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">

  <title>Questionário Pe. Reus - Resumos</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="../aa.ico">
  <style>
    .quiz-controls {
      position: sticky;
      top: 66px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px 34px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
    }

    .quiz-mode-btn {
      border: 1.5px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--ink);
      padding: 9px 18px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease, background 200ms ease, box-shadow 200ms ease;
    }

    .quiz-mode-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .quiz-mode-btn.active {
      border-color: var(--red-dark);
      background: var(--red);
      color: #ffffff;
      box-shadow: 0 0 0 1px rgba(127, 29, 29, 0.4), 0 6px 14px rgba(185, 28, 28, 0.22);
    }

    .quiz-root {
      padding: 8px 34px 30px;
    }

    .qsection {
      border-bottom: 1px solid var(--line);
    }

    .qsection-head {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 18px 4px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .qsection-title {
      flex: 1;
      font-size: 1.12rem;
      font-weight: 800;
      color: var(--red-dark);
    }

    .qsection-count {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }

    .qsection-chevron,
    .q-chevron {
      flex: none;
      font-size: 1.1rem;
      color: var(--red);
      transition: transform 220ms ease;
    }

    .qsection.open > .qsection-head .qsection-chevron,
    .q.open .q-chevron {
      transform: rotate(90deg);
    }

    .qsection-body {
      display: none;
      padding: 0 0 12px;
    }

    .qsection.open > .qsection-body {
      display: block;
    }

    .q {
      border-top: 1px dashed var(--line);
    }

    .q:first-child {
      border-top: 0;
    }

    .q-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      padding: 13px 6px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .q-num {
      flex: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--red);
      color: #ffffff;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .q-text {
      flex: 1;
      line-height: 1.5;
    }

    .q-body {
      display: none;
      padding: 2px 6px 16px 48px;
    }

    .q.open .q-body {
      display: block;
    }

    .q-empty {
      margin: 0;
      padding: 12px 14px;
      border: 1px dashed rgba(185, 28, 28, 0.35);
      border-radius: 8px;
      background: rgba(185, 28, 28, 0.05);
      color: var(--muted);
      font-style: italic;
    }

    .q-answer {
      margin: 0;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .quiz-controls { padding: 12px 18px; top: 58px; }
      .quiz-root { padding: 4px 18px 24px; }
      .q-body { padding-left: 6px; }
    }
  </style>
</head>

        <button type="button" class="quiz-mode-btn" data-mode="sections">Seções</button>
      </div>

      <div class="quiz-root" id="quiz-root"></div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">AA - Acólitos Anônimos - Todos os direitos reservados</div>
  </footer>

  <script src="../nav.js"></script>

    (function () {
      var root = document.getElementById("quiz-root");
      if (!root) return;

      QUIZ.forEach(function (sec) {
        var section = document.createElement("section");
        section.className = "qsection";

        var head = document.createElement("button");
        head.type = "button";
        head.className = "qsection-head";
        head.innerHTML =
          '<span class="qsection-chevron" aria-hidden="true">&rsaquo;</span>' +
          '<span class="qsection-title">' + sec.title + "</span>" +
          '<span class="qsection-count">' + sec.range + "</span>";
        head.addEventListener("click", function () {
          section.classList.toggle("open");
        });

        var body = document.createElement("div");
        body.className = "qsection-body";

        sec.items.forEach(function (item) {
          var q = document.createElement("div");
          q.className = "q";

          var qHead = document.createElement("button");
          qHead.type = "button";
          qHead.className = "q-head";
          qHead.innerHTML =
            '<span class="q-num">' + item.n + "</span>" +
            '<span class="q-text">' + item.q + "</span>" +
            '<span class="q-chevron" aria-hidden="true">&rsaquo;</span>';
          qHead.addEventListener("click", function () {
            q.classList.toggle("open");
          });

          var qBody = document.createElement("div");
          qBody.className = "q-body";
          qBody.innerHTML = item.a
            ? '<div class="q-answer">' + item.a + "</div>"
            : '<p class="q-empty">Resposta em breve.</p>';

          q.appendChild(qHead);
          q.appendChild(qBody);
          body.appendChild(q);
        });

        section.appendChild(head);
        section.appendChild(body);
        root.appendChild(section);
      });

      var sections = root.querySelectorAll(".qsection");
      var questions = root.querySelectorAll(".q");
      var modeButtons = document.querySelectorAll(".quiz-mode-btn");

      function apply(mode) {
        if (mode === "all") {
          sections.forEach(function (s) { s.classList.add("open"); });
          questions.forEach(function (q) { q.classList.add("open"); });
        } else if (mode === "hide") {
          sections.forEach(function (s) { s.classList.add("open"); });
          questions.forEach(function (q) { q.classList.remove("open"); });
        } else if (mode === "sections") {
          sections.forEach(function (s) { s.classList.remove("open"); });
          questions.forEach(function (q) { q.classList.remove("open"); });
        }
        modeButtons.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-mode") === mode);
        });
      }

      modeButtons.forEach(function (b) {
        b.addEventListener("click", function () {
          apply(b.getAttribute("data-mode"));
        });
      });

      // Modo padrao: Mostrar tudo.
      apply("all");
    })();
  </script>
</body>
</html>
